# .github/workflows/test.yml
# 这是一个 GitHub Actions 工作流配置文件，用于在代码推送或拉取请求时自动运行接口自动化测试。

name: 接口自动化测试

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试（测试环境）
        run: pytest testcases/ -v --env=test --html=reports/report.html --self-contained-html

      - name: 上传测试报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: reports/report.html