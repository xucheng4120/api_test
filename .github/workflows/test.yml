# .github/workflows/test.yml

name: 接口自动化测试

on:
  push:
    branches: [ main ]       # 推送到 main 分支时触发
  pull_request:
    branches: [ main ]       # 提交 PR 时触发
  workflow_dispatch:          # 支持手动触发

jobs:
  test:
    runs-on: ubuntu-latest    # 在 Linux 云服务器上运行

    steps:
      - name: 拉取代码
        uses: actions/checkout@v3

      - name: 安装 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行测试（测试环境）
        run: pytest testcases/ -v --env=test --html=reports/report.html --self-contained-html

      - name: 上传测试报告
        uses: actions/upload-artifact@v3
        if: always()          # 不管成功失败都上传报告
        with:
          name: test-report
          path: reports/report.html